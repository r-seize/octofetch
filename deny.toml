# cargo deny configuration (compatible with cargo-deny 0.14+)
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
version    = 2
ignore     = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
]

[bans]
multiple-versions    = "warn"
deny                 = []
skip                 = []

[sources]
unknown-registry    = "deny"
unknown-git         = "deny"
allow-registry      = ["https://github.com/rust-lang/crates.io-index"]
